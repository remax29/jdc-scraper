services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: n8n
    volumes:
      - pgdata:/var/lib/postgresql/data

  n8n:
    image: n8nio/n8n:1.116.0
    restart: always
    depends_on:
      - postgres
    ports:
      - "5678:5678"        # local dev: access at http://localhost:5678
    environment:
      - N8N_HOST=localhost
      - N8N_PROTOCOL=http
      - N8N_PORT=5678
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - GENERIC_TIMEZONE=Asia/Manila
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASS}
      - N8N_SHARED_SECRET=${N8N_SHARED_SECRET}
    volumes:
      - n8ndata:/home/node/.n8n

volumes:
  pgdata: {}
  n8ndata: {}

# -------------------------------------------------------------------
# DEPLOYMENT NOTE: When moving to a VPS, add a Caddy service for HTTPS:
#   caddy:
#     image: caddy:2
#     ports: ["80:80","443:443"]
#     volumes: [./Caddyfile:/etc/caddy/Caddyfile, caddy_data:/data]
#   volumes: { caddy_data: {} }
# Update N8N_HOST, N8N_PROTOCOL, and WEBHOOK_URL to your public subdomain.
# -------------------------------------------------------------------
